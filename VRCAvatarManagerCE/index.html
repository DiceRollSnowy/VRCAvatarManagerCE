<!doctype html>
<html>
    <head>
        <meta charset='utf-8'>
        <link rel='stylesheet' href='css/destyle.min.css'>
        <link rel='stylesheet' href='css/style.css'>
        <link rel='stylesheet' href='css/variables.css'>
    </head>
    <body>
        <header>
            <div class='top'>
                <span class='title'>VRChat Avatar Manager</span>
                <div class='status'>--/--件 / Last Sync --:--</div>
            </div>
            <div class='toolbar'>
                <div class='toolbar-left'>
                    <div class='sync-group'>
                        <button id='sync25Btn'>最新25件同期</button>
                        <button id='syncAllBtn'>全件同期</button>
                    </div>
                    <div class='filter-group'>
                        <input id='filterNameText' placeholder='名前で検索'>
                        <button id="filterNameBtn" class="">検索</button>
                    </div>
                    <div class='sort-group'>
                        <span class="">ソート</span>
                        <select id='sortBox' class='select'>
                            <option>A-Z</option>
                            <option>Z-A</option>
                        </select>
                    </div>
                </div>
                <div class='toolbar-right'>
                    <button id="sizeSmallBtn">小</button>
                    <button id="sizeMediumBtn">中</button>
                    <button id="sizeLargeBtn">大</button>
                </div>
            </div>
        </header>

        <main id='avatarGrid'></main>

        <dialog id='avatarDetailModal'>
            <div class="avatar-detail">
                <div class='avatar-detail-title'>
                    <span id="avatarName" class='avatar-detail-name'></span>
                </div>
                <div class='avatar-detail-thumbnail'>
                    <img id='avatarThumbnail' class="avatar-detail-thumbnail-img"></img>
                </div>
                <div class='avatar-detail-info'>
                    <div class="info-row">
                        <span class="info-label">Description</span>
                        <span id="avatarDescription" class="info-value">aaaaa</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Unity</span>
                        <span id="avatarUnityVer" class="info-value">bbbbb</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Platform</span>
                        <span id="avatarPlatform" class="info-value">ccccc</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Created</span>
                        <span id="avatarCreatedAt" class="info-value">ddddd</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Updated</span>
                        <span id="avatarUpdatedAt" class="info-value">eeeee</span>
                    </div>
                </div>
                <div class='avatar-detail-buttons'>
                    <button id='changeAvatarBtn'>アバター変更</button>
                    <button id='copyBpidBtn'>BPID コピー</button>
                    <button id='openWebBtn'>VRC WebPage</button>
                    <button id='deleteAvatarBtn' class="danger">アバター削除</button>
                </div>
                <div class='avatar-detail-footer'>
                    <button id='closeAvatarDetailBtn' class='avatar-detail-close'>閉じる</button>
                </div>
            </div>
        </dialog>

        <script src='./js/sampleData.js'></script>
        <script src='./js/avatarRepository.js'></script>
        <script src='./js/app.js'></script>
    </body>
</html>
