<!doctype html>
<html>
    <head>
        <meta charset='utf-8'>
        <link rel='stylesheet' href='css/destyle.min.css'>
        <link rel='stylesheet' href='css/style.css'>
        <link rel='stylesheet' href='css/variables.css'>
    </head>
    <body>
        <header>
            <div class='top'>
                <span class='title'>VRChat Avatar Manager</span>
                <div class='status'>--/--件 / Last Sync --:--</div>
            </div>
            <div class='toolbar'>
                <div class='toolbar-left'>
                    <div class='sync-group'>
                        <button id='sync25Btn'>最新25件同期</button>
                        <button id='syncAllBtn'>全件同期</button>
                    </div>
                    <div class='filter-group'>
                        <input id='filterNameText' placeholder='名前で検索'>
                        <button id="filterNameBtn" class="">検索</button>
                    </div>
                    <div class='sort-group'>
                        <span class="">ソート</span>
                        <select id='sortSelect' class='select'>
                            <option value="updatedDesc">更新日時（新しい）</option>
                            <option value="updatedAsc">更新日時（古い）</option>
                            <option value="nameAsc">名前（A-Z）</option>
                            <option value="nameDesc">名前（Z-A）</option>
                        <!--
                            <option value="createdDesc">作成日時（新しい）</option>
                            <option value="createdAsc">作成日時（古い）</option>
                        -->
                        </select>
                    </div>
                </div>
                <div class='toolbar-right'>
                    <button id="sizeSmallBtn">小</button>
                    <button id="sizeMediumBtn">中</button>
                    <button id="sizeLargeBtn">大</button>
                </div>
            </div>
        </header>

        <main id='avatarGrid'></main>

        <dialog id='avatarDetailDialog'>
            <div class="avatar-detail">
                <div class='avatar-detail-title'>
                    <span id="avatarName" class='avatar-detail-name'></span>
                </div>
                <div class='avatar-detail-thumbnail'>
                    <img id='avatarThumbnail' class="avatar-detail-thumbnail-img"></img>
                </div>
                <div class='avatar-detail-info'>
                    <div class="info-row">
                        <span class="info-label">Description</span>
                        <span id="avatarDescription" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Platform</span>
                        <span id="avatarPlatform" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Rank</span>
                        <span id="avatarPerformanceRank" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Created</span>
                        <span id="avatarCreatedAt" class="info-value">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Updated</span>
                        <span id="avatarUpdatedAt" class="info-value">-</span>
                    </div>
                </div>
                <div class='avatar-detail-buttons'>
                    <button id='changeAvatarBtn'>アバター変更</button>
                    <button id='copyAvatarIdBtn'>BPID コピー</button>
                    <button id='openAvatarPageBtn'>VRC WebPage</button>
                    <button id='deleteAvatarBtn' class="danger">アバター削除</button>
                </div>
                <div class='avatar-detail-footer'>
                    <button id='closeAvatarDetailBtn' class='avatar-detail-close'>閉じる</button>
                </div>
            </div>
        </dialog>

        <script src='./js/SampleData.js'></script>
        <script src='./js/repositories/SettingRepository.js'></script>
        <script src='./js/services/IndexedDb.js'></script>

        <script type="module" src='./js/util/Utils.js'></script>

        <script src='./js/model/Avatar.js'></script>
        <script type="module" src='./js/model/AvatarMapper.js'></script>

        <script type="module" src='./js/services/ImageLoader.js'></script>
        <script type="module" src='./js/services/VrchatApiService.js'></script>
        <script type="module" src='./js/repositories/AvatarRepository.js'></script>
        <script type="module" src='./js/filter/AvatarFilter.js'></script>

        <script type="module" src='./js/app.js'></script>
    </body>
</html>
